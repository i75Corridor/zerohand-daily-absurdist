name: The Daily Absurdist
description: "Satirical news pipeline: research → write → edit → publish"
status: active

model: google/gemini-2.5-flash
systemPrompt: "You are The Daily Absurdist AI editorial team. Each step in this pipeline performs a specialized editorial function: researching topics, writing satirical articles, editing for quality, generating illustrations, and publishing the final piece."

inputSchema:
  type: object
  properties:
    topic:
      type: string
      description: Topic for the satirical article
  required:
    - topic

context:
  company: ./COMPANY.md

steps:
  - name: Research
    skill: researcher
    timeoutSeconds: 120
    promptTemplate: |
      Research the following topic for The Daily Absurdist: "{{input.topic}}"

      Run exactly 3 web searches as instructed, then compile the structured research report.

  - name: Write
    skill: writer
    timeoutSeconds: 180
    promptTemplate: |
      Write a satirical article based on the following research:

      {{steps.0.output}}

      Remember: 2,000–2,500 words, dry deadpan throughout, non-obvious satirical angle.

  - name: Edit
    skill: editor
    timeoutSeconds: 60
    promptTemplate: |
      Review and edit this article. Respond with the JSON object as instructed:

      {{steps.1.output}}

  - name: Illustrate
    skill: imagen
    timeoutSeconds: 120
    promptTemplate: "{{steps.2.output.imagePrompt}}"

  - name: Publish
    skill: publisher
    timeoutSeconds: 30
    promptTemplate: "{{steps.1.output}}"
    metadata:
      imageStepIndex: 3
